<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PixelTip logo">
  <defs>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e6b8"/>
      <stop offset="1" stop-color="#00866c"/>
    </linearGradient>
  </defs>
  <rect x="3" y="3" width="250" height="250" rx="52" fill="#0c0c0c" stroke="#1e2a27" stroke-width="2"/>
  <!-- coin -->
  <circle cx="118" cy="138" r="62" fill="url(#coin)"/>
  <circle cx="118" cy="138" r="62" fill="none" stroke="#0c0c0c" stroke-width="6" stroke-dasharray="3 7" opacity="0.4"/>
  <!-- tip arrow cut from the coin -->
  <path d="M118 104 L150 148 H131 V174 H105 V148 H86 Z" fill="#0c0c0c"/>
  <!-- pixel sparks -->
  <rect x="170" y="58" width="20" height="20" rx="3" fill="#00b894"/>
  <rect x="194" y="86" width="13" height="13" rx="2" fill="#00b894" opacity="0.8"/>
  <rect x="178" y="98" width="9" height="9" rx="2" fill="#00b894" opacity="0.55"/>
</svg>
